<script >
    async function myFunction() {
    let cep = document.getElementById("myInput")
    let myTable = document.getElementById("myTable")
    
    const response = await fetch(`https://viacep.com.br/ws/${cep.value}/json/`)
    const 
    const data = await response.json()
    myTable.innerHTML = `<tr><td>${data.cep}</td><td>${data.logradouro}</td><td>${data.bairro}</td><td>${data.localidade}</td><td>${data.uf}</td></tr>`+
    `<tr><td><input type="radio" value="Color"></td><td>Radio Button</td></tr>`+
    `<tr><td><input type="button" value="Color"></td><td>Button</td></tr>`+
    `<tr><td><input type="checkbox" value="Color"></td><td>Checkbox</td></tr>`

}
  </script>
<body>
