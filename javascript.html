<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script >
    async function myFunction() {
    let cep = document.getElementById("myInput")
    let div = document.getElementById("myDiv")
    
    const response = await fetch(`https://viacep.com.br/ws/${cep.value}/json/`) 
    const data = await response.json()
    div.innerHTML = `CEP: ${data.cep} <br> Logradouro: ${data.logradouro} <br> Bairro: ${data.bairro} <br> Cidade: ${data.localidade} <br> Estado: ${data.uf}`
}
  </script>
<body>
    <button onclick="myFunction()">Chamar</button>
    <input type="text" id="myInput" placeholder="Digite seu o CEP">
    <div id="myDiv"></div>
</body>
</html>
